let audioCtx=null;function ensureAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();}
function stopAll(){if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}}
function tone(freq,dur,delay,type,vol){ensureAudio();let o=audioCtx.createOscillator();let g=audioCtx.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(audioCtx.destination);let t=audioCtx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.1);}
function playOde(){stopAll();let notes=[659,659,698,783,783,698,659,587,523,523,587,659,659,587,587];let cur=0;notes.forEach(function(f){if(K>=1.5){tone(f,0.4,cur,"sine",0.15);tone(f*1.5,0.4,cur,"triangle",0.06);}else{tone(f,0.4,cur,"sine",0.15);}cur+=0.35;});log("♫歓喜 k="+K+(K>=1.5?" 和音3重":" 単音"));}
function playFate(){stopAll();let pat=[392,392,392,311];for(let i=0;i<8;i++){let f=pat[i%4];let d=f==311?0.6:0.15;tone(f,d,i*0.28,"sawtooth",0.16);}log("♫運命 k="+K);}
function log(t){let d=document.getElementById("log");d.innerHTML+="<div>>> "+t+"</div>";d.scrollTop=d.scrollHeight;}
function getFac(x,y){let tp=WORLD[y][x];if(tp=="center")return {n:"中央広場⛲",e:"⛲"};if(tp=="town")return {n:"街🏘️",e:"🏘️"};if(tp=="castle")return {n:"魔王城🏰",e:"🏰"};if(tp=="dungeon")return {n:"洞窟🕳️",e:"🕳️"};if(tp=="water")return {n:"海🌊",e:"🌊"};if(tp=="mount")return {n:"山⛰️",e:"⛰️"};return null;}
function renderMap(){let size=K>=1.5?21:11;let m=document.getElementById("map");m.style.gridTemplateColumns="repeat("+size+","+(K>=1.5?30:28)+"px)";m.innerHTML="";let half=size>>1;for(let dy=-half;dy<=half;dy++)for(let dx=-half;dx<=half;dx++){let wx=state.x+dx,wy=state.y+dy;let cell=document.createElement("div");cell.className="cell";if(wx<0||wy<0||wx>=100||wy>=100){cell.textContent="⬛";cell.style.background="#000";m.appendChild(cell);continue;}let f=getFac(wx,wy);let tp=WORLD[wy][wx];if(tp=="town"||tp=="center")cell.classList.add("town");if(tp=="castle")cell.classList.add("castle");if(tp=="dungeon")cell.classList.add("dungeon");if(f)cell.textContent=f.e;if(dx==0&&dy==0){cell.classList.add("view");cell.textContent="🧙";}m.appendChild(cell);}document.getElementById("kval").textContent=K;document.getElementById("pos").textContent=state.x+","+state.y;document.getElementById("lv").textContent=state.level;document.getElementById("gold").textContent=state.gold;document.getElementById("hp").textContent=state.hp+"/"+state.max;}
function renderParty(){let p=document.getElementById("party");p.innerHTML="";CHARAS.forEach(function(c){let d=document.createElement("div");d.className="chara";let pow=Math.round(10*Math.pow(K,c.id+1));d.innerHTML="<img src='"+c.img+"'><br><b>"+c.name+"</b><br>"+c.role+"<br>強さ"+pow;p.appendChild(d);});}
function renderQuest(){document.getElementById("quest").innerHTML=(state.quest.start?"☑":"☐")+"広場50,50<br>"+(state.quest.dungeon?"☑":"☐")+"洞窟踏破<br>"+(state.quest.castle?"☑":"☐")+"魔王城50,5<br><br>層3 圧縮 "+(100*Math.exp(-K*3)).toFixed(1)+"%<br>層3 拡大 "+(Math.pow(K,3)*100).toFixed(0)+"%<br><br>練習=本番 次回は12人で本格RPGへ<br>ベートーヴェンPD 自前生成 本番利用可";}
function move(dx,dy){let nx=state.x+dx,ny=state.y+dy;if(nx<0||nx>=100||ny<0||ny>=100)return;let tp=WORLD[ny][nx];if(tp=="water"||tp=="mount"){log("海/山 進めない");return;}state.x=nx;state.y=ny;let f=getFac(nx,ny);if(f){log(f.n+" "+f.e);if(f.e=="🏘️"||f.e=="⛲"){state.quest.start=true;if(Math.random()<0.35)playOde();}if(f.e=="🏰"){state.quest.castle=true;playFate();log("ステラ女王『練習が本番よ、幸雄』");}if(f.e=="🕳️"){state.quest.dungeon=true;if(Math.random()<0.5){log("敵！");state.hp-=5+Math.random()*10|0;if(state.hp<=0){state.hp=1;state.x=50;state.y=50;log("倒れた...広場へ");}}playFate();}}renderMap();renderQuest();}
function switchK(k){K=k;stopAll();renderMap();renderParty();renderQuest();log("k="+k+" 切替 指数再計算");}
function saveGame(){localStorage.setItem("z_practice_final",JSON.stringify(state));log("セーブ完了");}
