
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンジェル Visual ML</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://sql.js.org/dist/sql-wasm.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>body{font-family:'Zen Maru Gothic',sans-serif} .glass{backdrop-filter:blur(20px)}</style>
</head>
<body class="bg-[#08081a] text-white min-h-screen">
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const IMAGES = {
  angel: "data:image/webp;base64,UklGRgozCQBXRUJQVlA4WAoAAAAEAAAAXwQAvwgAVlA4ID4pCQCQwhWdASpgBMAIPhkKhEIhBBoSBABhLKAYOVvn1eh5kX3R/g/NT2beQe3X4T99/zX/Y/x3vF/9/+m7q/Zf95/8P9d+WfwEdGf9//K/6H9uPld/v/+1/qf[...]
  mage: "data:image/webp;base64,UklGRqAcCgBXRUJQVlA4WAoAAAAEAAAAXwQAvwgAVlA4INQSCgAQlRedASpgBMAIPhkMhEGhBE5zPAQAYSygF1hfV8PmJ5R9ff5f876IHIvbd8q+//6L/yf5j3m//P/VdPXY37a/mT75nS//l/zv+r/dH5f/8X/3/733k/z7[...]
};

const AngelVisualML = () => {
  const [images, setImages] = React.useState({});

  React.useEffect(() => {
    setImages(IMAGES);
  }, []);

  return (
    <div className="w-full h-screen bg-gradient-to-br from-[#1a1a3a] via-[#08081a] to-[#000510]">
      <div className="glass fixed inset-0 backdrop-blur-xl bg-black/20"></div>
      <div className="relative z-10 flex flex-col items-center justify-center min-h-screen p-4">
        <h1 className="text-6xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-cyan-400">
          アンジェル Visual ML
        </h1>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl">
          {Object.entries(images).map(([key, value]) => (
            <div key={key} className="rounded-lg overflow-hidden shadow-2xl hover:shadow-purple-500/50 transition-all duration-300">
              <img src={value} alt={key} className="w-full h-auto object-cover" />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AngelVisualML />);
</script>
</body>
</html>
